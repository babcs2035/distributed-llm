# ====================================================================
# mise.toml - Distributed LLM Inference Pipeline Task Definitions
# ====================================================================

[tools]
python = "3.12"
uv = "latest"

# ====================================================================
# Environment Setup
# ====================================================================

[tasks.sync]
description = "Create and sync Python virtual environment"
run = "uv sync"

[tasks."setup:env"]
description = "Create config.json template"
run = "test -f config.json && echo 'config.json already exists' || cp config.json.example config.json && echo 'config.json created'"

[tasks."setup:registry"]
description = "Set up private Docker registry on management server"
run = "uv run python tools/setup_registry.py"

# ====================================================================
# Build
# ====================================================================

[tasks.build]
description = "Build Docker image locally and push to registry (via SSH tunnel)"
run = "uv run python tools/deploy.py --build-only"

# ====================================================================
# Model Split
# ====================================================================

[tasks."split:models"]
description = "Download and split Hugging Face model, transfer to master"
run = "uv run python tools/deploy.py --split-only"

[tasks."split:models:dry-run"]
description = "Show split plan only (local)"
run = "uv run python tools/split_model.py --dry-run"

# ====================================================================
# Deploy
# ====================================================================

[tasks.deploy]
description = "Full deploy (local build + split + transfer + distribute + deploy)"
run = "uv run python tools/deploy.py"

[tasks."deploy:dry-run"]
description = "Dry run of deploy"
run = "uv run python tools/deploy.py --dry-run"

# ====================================================================
# Operations & Monitoring
# ====================================================================

[tasks.status]
description = "Health check on all nodes"
run = "uv run python tools/healthcheck.py"

[tasks."status:verbose"]
description = "Verbose health check (includes logs and CPU temperature)"
run = "uv run python tools/healthcheck.py --verbose"

[tasks."logs"]
description = "Display latest logs from all nodes"
run = "uv run python tools/show_logs.py --all"

# ====================================================================
# Stop & Cleanup
# ====================================================================

[tasks.stop]
description = "Stop inference containers on all nodes"
run = "uv run python tools/cluster_control.py stop"

[tasks.restart]
description = "Restart inference containers on all nodes"
run = "uv run python tools/cluster_control.py restart"

[tasks.clean]
description = "Completely remove containers and images on all nodes"
run = "uv run python tools/cluster_control.py clean"

# ====================================================================
# Debug
# ====================================================================

[tasks."debug:ssh"]
description = "Test SSH connections to all nodes"
run = "uv run python tools/debug_tools.py ssh"

[tasks."debug:mtu"]
description = "Check MTU settings on all nodes"
run = "uv run python tools/debug_tools.py mtu"

[tasks."debug:models"]
description = "Check model weight deployment on all nodes"
run = "uv run python tools/debug_tools.py models"

[tasks."debug:ports"]
description = "Check port availability on management server"
run = "uv run python tools/debug_tools.py ports"

[tasks."debug:temp"]
description = "Check CPU temperature on all nodes"
run = "uv run python tools/debug_tools.py temp"

# ====================================================================
# Inference
# ====================================================================

[tasks.predict]
description = "Send prompt to distributed LLM and display inference result (via SSH)"
run = "uv run python tools/predict.py"

[tasks."predict:demo"]
description = "Send demo prompt and persist rank0 metrics to results/Iter{n}.jsonl"
run = 'uv run python tools/collect_results.py --iter Iter1 --prompt "Hello!"'
